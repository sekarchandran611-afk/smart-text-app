<h1>Smart Text BOX</h1>

<p>Type your text below:</p>

<textarea [(ngModel)]="myText" rows="4" cols="20"></textarea>
<hr>

<h3>Your Results:</h3>
<ul>
  <li>Characters: {{ myText.length }}</li>
  <li>Words: {{ countWords() }}</li>
</ul>

<button (click)="resetEverything()">Clear Text</button>
